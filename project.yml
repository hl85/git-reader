name: GitReader

options:
  bundleIdPrefix: com.gitreader
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    DEAD_CODE_STRIPPING: YES
    DEVELOPMENT_TEAM: ""  # 请填入你的 Apple Developer Team ID
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  GitReader:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: GitReader
        excludes:
          - "**/.build/**"
          - "**/Package.swift"
          - "**/*.md"
        createIntermediateGroups: true
    info:
      path: GitReader/Info.plist
      properties:
        CFBundleDisplayName: Gits Reader
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ClaudeBackground
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gitreader.app
        TARGETED_DEVICE_FAMILY: "1,2"  # iPhone + iPad
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    dependencies:
      - package: GitLib
        product: GitLib
      - package: swift-markdown
        product: Markdown
      - package: Yams
        product: Yams
      - package: Nuke
        product: NukeUI
      - package: swift-markdown-ui
        product: MarkdownUI

packages:
  # ⚠️ swift-libgit2 上游 Package.swift 包含本地路径依赖（path: "../swift-libgit2-base"），
  # 无法被 SPM 远程解析。三种解决方案见 README "已知问题与备选方案"：
  #   方案 A: 使用 pre-built XCFramework（推荐）
  #   方案 B: 用 Process 调 git CLI（已实现见 Services/GitCLISyncService.swift）
  #   方案 C: 切换到其他 Git 库（如 CGit/ObjectiveGit）
  GitLib:
    url: https://github.com/swift-developer-tools/swift-libgit2.git
    exactVersion: 1.0.1
  swift-markdown:
    url: https://github.com/swiftlang/swift-markdown.git
    exactVersion: 0.7.2
  Yams:
    url: https://github.com/jpsim/Yams.git
    from: 5.0.0
  Nuke:
    url: https://github.com/kean/Nuke.git
    from: 12.0.0
  swift-markdown-ui:
    url: https://github.com/gonzalezreal/swift-markdown-ui.git
    from: 2.0.0

schemes:
  GitReader:
    build:
      targets:
        GitReader: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
