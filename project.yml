name: GitReader

options:
  bundleIdPrefix: com.gitreader
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    DEAD_CODE_STRIPPING: YES
    DEVELOPMENT_TEAM: ""  # 请填入你的 Apple Developer Team ID
    CODE_SIGN_STYLE: Automatic

targets:
  GitReader:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    configFiles:
      Debug: GitReader/Version.xcconfig
      Release: GitReader/Version.xcconfig
    preBuildScripts:
      - name: "Auto Update Version & Build"
        shell: /bin/sh
        runOncePerArchitecture: false
        script: |
          # 确保在项目根目录下运行
          cd "$SRCROOT"

          # 1. 获取 Git 总提交次数作为 Build 号 (CURRENT_PROJECT_VERSION)
          git_commit_count=$(git rev-list --count HEAD)
          if [ -z "$git_commit_count" ]; then
              git_commit_count=1
          fi

          # 2. 获取最新的 Git Tag 作为 Version 号 (MARKETING_VERSION)
          git_tag=$(git describe --tags --abbrev=0 2>/dev/null)
          if [ -z "$git_tag" ]; then
              marketing_version="0.1.2"
          else
              # 去掉 tag 前面的 'v' 字符
              marketing_version=$(echo "$git_tag" | sed 's/^v//')
          fi

          # 3. 将结果写入 Version.xcconfig
          cat << EOF > GitReader/Version.xcconfig
          // 自动生成的文件，请勿手动修改，且需加入 .gitignore
          MARKETING_VERSION = $marketing_version
          CURRENT_PROJECT_VERSION = $git_commit_count
          EOF

          echo "Updated Version.xcconfig: Version=$marketing_version, Build=$git_commit_count"
    sources:
      - path: GitReader
        excludes:
          - "**/.build/**"
          - "**/Package.swift"
          - "**/*.md"
        createIntermediateGroups: true
    info:
      path: GitReader/Info.plist
      properties:
        CFBundleDisplayName: Gits Reader
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ClaudeBackground
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gitreader.app
        TARGETED_DEVICE_FAMILY: "1,2"  # iPhone + iPad
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    dependencies:
      - package: GitLib
        product: GitLib
      - package: swift-markdown
        product: Markdown
      - package: Yams
        product: Yams
      - package: Nuke
        product: NukeUI
      - package: Highlightr
        product: Highlightr

packages:
  # swift-libgit2 上游 Package.swift 包含本地路径依赖（path: "../swift-libgit2-base"），
  # 无法被 SPM 远程解析，因此使用 LocalPackages 中的本地副本。
  GitLib:
    path: LocalPackages/swift-libgit2-local
  swift-markdown:
    url: https://github.com/swiftlang/swift-markdown.git
    exactVersion: 0.7.2
  Yams:
    url: https://github.com/jpsim/Yams.git
    from: 5.0.0
  Nuke:
    url: https://github.com/kean/Nuke.git
    from: 12.0.0
  Highlightr:
    url: https://github.com/raspu/Highlightr.git
    from: 2.2.0

schemes:
  GitReader:
    build:
      targets:
        GitReader: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
